version: '3.8'

services:
  x-bookmarks:
    build: .
    container_name: x-bookmarks
    restart: unless-stopped
    ports:
      - "3002:3002"
    volumes:
      # Persist database
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3002
      # ⚠️ CHANGE THIS PASSWORD!
      - AUTH_PASSWORD=your-secure-password-here
      # Random secret for signing tokens (generate with: openssl rand -hex 32)
      - AUTH_SECRET=change-me-to-random-string
